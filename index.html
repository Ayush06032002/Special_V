
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Valentine? 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#ff6b9d,#ff9a9e,#fecfef,#ff6b9d);
background-size:400% 400%;
animation:gradientShift 6s ease infinite;
font-family:'Nunito',sans-serif;
overflow:hidden;
}

@keyframes gradientShift{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.hearts-bg{
position:fixed;
inset:0;
pointer-events:none;
z-index:0;
}

.heart-float{
position:absolute;
font-size:1.5rem;
opacity:0.25;
animation:floatUp linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(100vh) rotate(0deg);opacity:0.3;}
100%{transform:translateY(-120px) rotate(360deg);opacity:0;}
}

.card{
position:relative;
z-index:1;
background:rgba(255,255,255,0.92);
backdrop-filter:blur(12px);
border-radius:32px;
padding:50px 60px;
text-align:center;
box-shadow:0 20px 60px rgba(255,80,120,0.35);
max-width:480px;
width:90vw;
animation:popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes popIn{
from{opacity:0;transform:scale(0.6);}
to{opacity:1;transform:scale(1);}
}

.bear{
font-size:5rem;
display:inline-block;
animation:bounce 1.8s infinite;
margin-bottom:10px;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

h1{
font-family:'Pacifico',cursive;
font-size:1.9rem;
color:#d63384;
margin-bottom:8px;
}

.subtitle{
font-size:1rem;
color:#c2698f;
margin-bottom:30px;
font-weight:600;
}

.buttons{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.btn{
border:none;
border-radius:50px;
cursor:pointer;
font-family:'Nunito';
font-weight:800;
}

#yesBtn{
font-size:1.1rem;
padding:14px 34px;
background:linear-gradient(135deg,#ff4f8b,#ff6b9d);
color:white;
box-shadow:0 8px 24px rgba(255,79,139,0.45);
}

#yesBtn:hover{transform:scale(1.08);}

#noBtn{
font-size:1rem;
padding:12px 28px;
background:linear-gradient(135deg,#f0f0f0,#e0e0e0);
color:#888;
}

#yesScreen{display:none;}

.big-heart{
font-size:6rem;
display:block;
margin:10px 0;
animation:heartBeat 0.8s infinite;
}

@keyframes heartBeat{
0%,100%{transform:scale(1);}
25%{transform:scale(1.2);}
50%{transform:scale(1);}
75%{transform:scale(1.15);}
}

@keyframes explode{
0%{transform:scale(0);opacity:1;}
100%{transform:translateY(-200px) scale(1.5);opacity:0;}
}

#loveMessage{
margin-top:20px;
font-size:2rem;
color:#ff4f8b;
animation:lovePulse 1.2s infinite;
}

@keyframes lovePulse{
0%{transform:scale(1);}
50%{transform:scale(1.15);}
100%{transform:scale(1);}
}

/* Envelope screen */

#envelopeScreen{
position:fixed;
inset:0;
background:#ff6b9d;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:9999;
color:white;
font-family:'Pacifico';
}

#envelope{
font-size:120px;
cursor:pointer;
transition:transform 0.5s;
}

</style>
</head>

<body>

<div id="envelopeScreen">

<div id="envelope">💌</div>

<h2 style="margin-top:20px;font-weight:normal;">A Special Letter For You</h2>

<button onclick="openEnvelope()" style="margin-top:25px;padding:12px 25px;border:none;border-radius:30px;background:white;color:#ff4f8b;font-weight:bold;cursor:pointer;">
Open Letter 💌
</button>

</div>

<div class="hearts-bg" id="heartsBg"></div>

<div class="card" id="questionCard">

<div class="bear">🐻</div>

<h1>Will you be my Valentine? 💕</h1>

<p class="subtitle">There's only ONE right answer here 😉</p>

<div class="buttons">

<button class="btn" id="yesBtn" onclick="sayYes()">💖 Yes! 💖</button>

<button class="btn" id="noBtn" onclick="clickNo()">No</button>

</div>

</div>

<div class="card" id="yesScreen">

<span class="big-heart">❤️</span>

<h1>Yaaay! 🥰</h1>

<p class="subtitle">
I knew you'd say yes!<br>
You make every day feel like Valentine's Day 💕
</p>

<h2 id="loveMessage">I Love You ❤️</h2>

</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7cdd4f9d71.mp3" type="audio/mpeg">
</audio>

<script>

const heartsBg=document.getElementById('heartsBg');
const heartEmojis=['❤️','💕','💖','💗','💓','💞','💝','🌹'];

for(let i=0;i<22;i++){
const h=document.createElement('span');
h.classList.add('heart-float');
h.textContent=heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
h.style.left=Math.random()*100+'vw';
h.style.animationDuration=(5+Math.random()*8)+'s';
h.style.animationDelay=(Math.random()*8)+'s';
h.style.fontSize=(1+Math.random()*1.5)+'rem';
heartsBg.appendChild(h);
}

function openEnvelope(){

const env=document.getElementById("envelope");
env.style.transform="scale(1.3) rotate(15deg)";

setTimeout(()=>{
document.getElementById("envelopeScreen").style.display="none";
document.getElementById("bgMusic").play();
},700);

}

function clickNo(){

const noBtn=document.getElementById("noBtn");

const x=Math.random()*300-150;
const y=Math.random()*300-150;

noBtn.style.transform=`translate(${x}px,${y}px)`;

}

function heartExplosion(){

for(let i=0;i<200;i++){

const heart=document.createElement("span");

heart.textContent="❤️";
heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.top=Math.random()*100+"vh";
heart.style.fontSize=(1+Math.random()*3)+"rem";
heart.style.pointerEvents="none";
heart.style.zIndex="999";
heart.style.animation="explode 2s ease-out forwards";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),2000);

}

}

function sayYes(){

document.getElementById('questionCard').style.display='none';

const ys=document.getElementById('yesScreen');
ys.style.display='block';

heartExplosion();

setInterval(()=>{

const heart=document.createElement("span");

heart.textContent="❤️";
heart.style.position="fixed";
heart.style.left=Math.random()*100+"vw";
heart.style.top="100vh";
heart.style.fontSize=(1+Math.random()*2)+"rem";
heart.style.pointerEvents="none";
heart.style.animation="floatUp 5s linear";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

},500);

}

</script>

</body>
</html>
